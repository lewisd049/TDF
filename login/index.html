<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>The Diamond Fmaily - Login</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.login-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:250px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:10px;
    background:#4285F4;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    opacity:0.9;
}

.back{
    background:#777;
}

.logout{
    background:#d9534f;
}

#error{
    color:red;
    margin-top:10px;
}

.success{
    color:green;
    margin-bottom:15px;
}

.tick{
    color:green;
    font-size:40px;
}

</style>

</head>

<body>


<div class="login-box" id="box">

    <h2>Login</h2>

    <input type="email" id="username" placeholder="Email">

    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>

</div>



<script type="module">


import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import { 
    getAuth,
    signInWithEmailAndPassword,
    onAuthStateChanged,
    updateEmail,
    updatePassword,
    signOut
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";



// Firebase configuration

const firebaseConfig = {
  apiKey: "AIzaSyC_5lEfcu-Jk3vP0Dp3fh_KQcIgftKQr7c",
  authDomain: "tdf-login-cbb53.firebaseapp.com",
  projectId: "tdf-login-cbb53",
  storageBucket: "tdf-login-cbb53.firebasestorage.app",
  messagingSenderId: "660606755803",
  appId: "1:660606755803:web:9b96e5dc0f1e98c0f7fdfe"
};



const app = initializeApp(firebaseConfig);

const auth = getAuth(app);



const successURL = "https://www.tdf1.uk/memberarea";




// Login

window.login = async function(){

    const email =
    document.getElementById("username").value;


    const password =
    document.getElementById("password").value;


    try{

        await signInWithEmailAndPassword(
            auth,
            email,
            password
        );


        showWelcome();


    }catch(error){

        document.getElementById("error").innerHTML =
        "Incorrect email or password.";

    }

};





// Welcome page

window.showWelcome = function(){


    const user = auth.currentUser;


    document.getElementById("box").innerHTML = `


        <h2 class="success">
        Login Successful
        </h2>


        <p>
        Welcome, ${user.email}
        </p>



        <button onclick="openMembers()">
        Open Members Area
        </button>



        <button onclick="editProfile()">
        Edit Profile
        </button>



        <button class="logout" onclick="logout()">
        Logout
        </button>


    `;


};





// Open members in new tab

window.openMembers = function(){

    window.open(
        successURL,
        "_blank"
    );

};





// Edit profile screen

window.editProfile = function(){


    document.getElementById("box").innerHTML = `


        <h2>
        Edit Profile
        </h2>



        <input
        type="email"
        id="newEmail"
        placeholder="New Email">



        <input
        type="password"
        id="newPassword"
        placeholder="New Password">



        <button onclick="saveProfile()">
        Save Changes
        </button>



        <button class="back" onclick="returnToWelcome()">
        Back
        </button>



        <div id="error"></div>


    `;


};

    // Save profile changes

window.saveProfile = async function(){

    const user = auth.currentUser;


    const newEmail =
    document.getElementById("newEmail").value;


    const newPassword =
    document.getElementById("newPassword").value;



    try{


        if(newEmail){

            await updateEmail(
                user,
                newEmail
            );

        }



        if(newPassword){

            await updatePassword(
                user,
                newPassword
            );

        }



        showSuccess();



    }catch(error){


        document.getElementById("error").innerHTML =
        error.message;


    }


};





// Success screen

window.showSuccess = function(){


    document.getElementById("box").innerHTML = `


        <div class="tick">
        ✓
        </div>



        <h2 class="success">
        Success
        </h2>



        <p>
        Your profile has been updated successfully.
        </p>



        <button onclick="returnToWelcome()">
        Back
        </button>


    `;


};





// Return to welcome page

window.returnToWelcome = function(){


    auth.currentUser.reload().then(()=>{

        showWelcome();

    });


};





// Logout

window.logout = async function(){


    await signOut(auth);


    document.getElementById("box").innerHTML = `


        <h2>
        Login
        </h2>



        <input 
        type="email" 
        id="username" 
        placeholder="Email">



        <input 
        type="password" 
        id="password" 
        placeholder="Password">



        <button onclick="login()">
        Login
        </button>



        <div id="error"></div>


    `;


};





// Keep login after refresh

onAuthStateChanged(auth, (user)=>{


    if(user){

        showWelcome();

    }


});



</script>


</body>
</html>
