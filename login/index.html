<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.login-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:250px;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    width:100%;
    padding:10px;
    background:#4285F4;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    border-radius:8px;
}
button:hover{
    opacity:0.9;
}
#error{
    color:red;
    margin-top:10px;
}
.success{
    color:green;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>
</div>

<script>
// Users
const users = {
    "lewis": {
        password: "OliverScotland2025#",
        name: "Lewis"
    },
};

// Members area URL
const successURL = "https://www.tdf1.uk/memberarea";

function login() {

    // Convert username to lowercase so it isn't case-sensitive
    const username = document.getElementById("username").value.toLowerCase();
    const password = document.getElementById("password").value;

    if (users[username] && users[username].password === password) {

        // Show the user's display name
        document.querySelector(".login-box").innerHTML = `
            <h2 class="success">Login Successful</h2>
            <p>Welcome, ${users[username].name}!</p>
            <button onclick="window.location.href='${successURL}'">
                Open Members Area
            </button>
        `;

    } else {

        document.getElementById("error").innerHTML =
            "Incorrect username or password.";

    }
}
</script>

</body>
</html>
