<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#f4f4f4;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.login-box{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    width:250px;
    text-align:center;
}
input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:8px;
}
button{
    width:100%;
    padding:10px;
    background:#4285F4;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    border-radius:8px;
}
button:hover{
    opacity:0.9;
}
#error{
    color:red;
    margin-top:10px;
}
.success{
    color:green;
    margin-bottom:15px;
}
</style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input type="email" id="username" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="error"></div>
</div>

<!-- Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
import {
    getAuth,
    signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/12.1.0/firebase-auth.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyC_5lEfcu-Jk3vP0Dp3fh_KQcIgftKQr7c",
  authDomain: "tdf-login-cbb53.firebaseapp.com",
  projectId: "tdf-login-cbb53",
  storageBucket: "tdf-login-cbb53.firebasestorage.app",
  messagingSenderId: "660606755803",
  appId: "1:660606755803:web:9b96e5dc0f1e98c0f7fdfe"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Members area URL
const successURL = "https://www.tdf1.uk/memberarea";

// Make login callable from HTML
window.login = async function() {

    const email = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {

        const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password
        );

        const user = userCredential.user;

        document.querySelector(".login-box").innerHTML = `
            <h2 class="success">Login Successful</h2>
            <p>Welcome, ${user.email}!</p>
            <button onclick="window.location.href='${successURL}'">
                Open Members Area
            </button>
        `;

    } catch (error) {

        document.getElementById("error").innerHTML =
            "Incorrect email or password.";

    }

};

</script>

</body>
</html>
