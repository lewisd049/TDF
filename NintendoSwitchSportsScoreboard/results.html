<!DOCTYPE html>
<html>
<head>
  <title>Final Results</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body{
      background:#0d0d0d;
      color:white;
      font-family:Arial;
      padding:30px;
      text-align:center;
    }

    h1{
      font-size:60px;
    }

    table{
      width:100%;
      border-collapse:collapse;
      margin-top:30px;
    }

    th, td{
      border:1px solid #444;
      padding:20px;
      font-size:25px;
    }

    th{
      background:#222;
    }

    .gold{
      background:gold;
      color:black;
    }

    .silver{
      background:silver;
      color:black;
    }

    .bronze{
      background:#cd7f32;
    }

  </style>
</head>
<body>

<h1>🏆 Final Results</h1>

<h2 id="sport"></h2>

<table>

<thead>
<tr>
  <th>Position</th>
  <th>Name</th>
  <th>Score</th>
</tr>
</thead>

<tbody id="results"></tbody>

</table>

<script>

let data = JSON.parse(localStorage.getItem("scoreboardData")) || {
  sport:"Unknown",
  players:[]
};

document.getElementById("sport").innerText = data.sport;

data.players.sort((a,b)=>b.score-a.score);

let results = document.getElementById("results");

data.players.forEach((player,index)=>{

  let className = "";

  if(index===0) className="gold";
  if(index===1) className="silver";
  if(index===2) className="bronze";

  results.innerHTML += `
    <tr class="${className}">
      <td>${index+1}</td>
      <td>${player.name}</td>
      <td>${player.score}</td>
    </tr>
  `;
});

</script>

</body>
</html>
