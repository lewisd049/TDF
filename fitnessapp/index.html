<!DOCTYPE html>
<html>
<head>

<title>Teen Fitness Tracker</title>

<meta name="viewport"
content="width=device-width,initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#111827;
font-family:Arial;
color:white;
margin:0;
}

header{
background:#1f2937;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.container{
max-width:500px;
margin:auto;
padding:20px;
}

.card{
background:#1f2937;
padding:20px;
border-radius:20px;
margin-top:20px;
}

input{
width:100%;
padding:15px;
margin-top:10px;
background:#374151;
border:none;
color:white;
border-radius:12px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:15px;
border:none;
background:#10b981;
color:white;
font-size:18px;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#059669;
}

#message{
margin-top:20px;
text-align:center;
color:#34d399;
}

</style>

</head>
<body>

<header>

💪 Teen Fitness Tracker

</header>

<div class="container">

<div class="card">

<h2>Create Account</h2>

<input
id="email"
placeholder="Email">

<input
id="password"
type="password"
placeholder="Password">

<button onclick="signUp()">
Sign Up
</button>

<button onclick="login()">
Login
</button>

<div id="message"></div>

</div>

</div>

<script>

const SUPABASE_URL =
"https://lawqkakgbwwnpaivrnpp.supabase.co";

const SUPABASE_KEY =
"sb_publishable_aJFvZ01qJLVEMcNvE6GNnA_7ZrT5NfJ";

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

async function signUp(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

let {error} =
await supabase.auth.signUp({
email:email,
password:password
});

if(error){
document.getElementById(
"message"
).innerHTML =
error.message;
}
else{
document.getElementById(
"message"
).innerHTML =
"Account created!";
}

}

async function login(){

let email =
document.getElementById("email").value;

let password =
document.getElementById("password").value;

let {error} =
await supabase.auth.signInWithPassword({
email:email,
password:password
});

if(error){
document.getElementById(
"message"
).innerHTML =
error.message;
}
else{
document.getElementById(
"message"
).innerHTML =
"Logged in!";
}

}

</script>

</body>
</html>
