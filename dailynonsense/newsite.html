<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Nonsense</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#FFD600;overflow-x:hidden;}

/* INFINITE SCROLLING EMOJIS */
.emoji-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
flex-wrap:wrap;
font-size:50px;
line-height:60px;
opacity:0.05;
animation:scrollEmojis 40s linear infinite;
z-index:0;
}
.emoji-bg span{margin:5px;}
@keyframes scrollEmojis{
0%{transform:translateY(0);}
100%{transform:translateY(-100%);}
}

/* NAVIGATION */
nav{
position:fixed;width:100%;top:0;
background:white;padding:15px 40px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
z-index:100;
}
nav .logo{
font-weight:bold;font-size:24px;margin-right:20px;
}
nav .nav-links a{
text-decoration:none;color:black;margin-left:20px;font-weight:bold;
}
nav .join-btn{
background:black;color:white;padding:8px 15px;border-radius:8px;text-decoration:none;margin-left:20px;
}

/* HERO BANNER */
.hero{
position:relative;
background:url('https://images.unsplash.com/photo-1601597114112-7ad056ca9f28?auto=format&fit=crop&w=1600&q=80') center/cover no-repeat;
height:300px;
display:flex;align-items:center;justify-content:center;
margin-top:70px;
border-radius:15px;
overflow:hidden;
z-index:1;
}
.hero .content{
background:rgba(255,255,255,0.85);
padding:30px;
border-radius:15px;
text-align:center;
max-width:700px;
}
.hero h1{
font-family:'Playfair Display', serif;
font-size:36px;
margin-bottom:15px;
}
.hero p{
font-size:18px;
color:#333;
}

/* CONTAINER */
.container{max-width:900px;margin:auto;padding:40px 20px;position:relative;z-index:2;}

/* CARD */
.card{
background:white;padding:20px;
border-radius:15px;margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.reactions span{cursor:pointer;margin-right:10px;}
.pin{color:red;font-weight:bold;}
.small-btn{font-size:12px;margin-left:10px;cursor:pointer;color:#666;}

/* FORM */
form{background:white;padding:20px;border-radius:15px;margin-bottom:30px;}
input,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;}
button{margin-top:10px;padding:10px 20px;background:black;color:white;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<div class="emoji-bg" id="emoji-bg"></div>

<nav>
<div style="display:flex;align-items:center;">
<div class="logo">LOGO</div>
<div class="nav-links">
<a href="#discussion">Discussion</a>
</div>
</div>
<a class="join-btn" href="#join">Join</a>
</nav>

<!-- HERO BANNER -->
<div class="hero">
<div class="content">
<h1>Welcome to Daily Nonsense</h1>
<p>Share your funniest thoughts, reactions, and nonsense with our community. Join the fun and stay entertained!</p>
</div>
</div>

<div class="container">

<h2 id="discussion">Discussion</h2>

<form id="postForm">
<input name="name" placeholder="Your name" required>
<textarea name="message" placeholder="Your nonsense..." required></textarea>
<input id="captchaAnswer" placeholder="What is 3 + 4?" required>
<button type="submit">Post</button>
</form>

<div id="posts"></div>

</div>

<script>
// POPULATE INFINITE EMOJIS
const emojiBg=document.getElementById("emoji-bg");
const emojis=["😂","🤣","😆","😹","😜","🤪"];
const totalEmojis=500;
for(let i=0;i<totalEmojis;i++){
const span=document.createElement("span");
span.textContent=emojis[Math.floor(Math.random()*emojis.length)];
emojiBg.appendChild(span);
}

// FRONTEND FILTERED WORD LIST
const bannedWords=[
"shit","fuck","bitch","asshole","dick","pussy","cunt","bastard",
"nigger","chink","kike","spic","gook","faggot","tranny","retard",
"porn","sex","hentai","blowjob","cum","dickpic","nude","tits","fuckboy","fuckgirl","incest",
"weed","cocaine","meth","heroin","lsd","ecstasy","mdma","crack","opioid",
"kill","murder","bomb","shoot","stab","assault",
"free money","click here","subscribe","follow me","tiktok.com","discord.gg"
];

const URL="https://script.google.com/macros/s/AKfycbw1KTxR_Tonz1AG4ep2e7WnK5OfbpwC5wSOGSkYSpjBZdSOIHxFUjl2cXVbeRJmdPyemw/exec";

let lastData="";

// LOAD POSTS ANIMATED LIVE
function loadPosts(){
fetch(URL)
.then(r=>r.json())
.then(data=>{
const jsonStr=JSON.stringify(data);
if(jsonStr===lastData)return;
lastData=jsonStr;

const container=document.getElementById("posts");
container.innerHTML="";
data.forEach(post=>{
let reactionsHTML="";
for(let emoji in post.reactions){
reactionsHTML+=`${emoji} ${post.reactions[emoji]} `;
}
container.innerHTML+=`
<div class="card">
${post.pinned?'<div class="pin">📌 Pinned</div>':''}
<h3>${post.name}</h3>
<p>${post.message}</p>
<div class="reactions">
<span onclick="react(${post.id},'😂')">😂</span>
<span onclick="react(${post.id},'🔥')">🔥</span>
<span onclick="react(${post.id},'🤯')">🤯</span>
${reactionsHTML}
</div>
<div>
<span class="small-btn" onclick="editPost(${post.id})">Edit</span>
<span class="small-btn" onclick="deletePost(${post.id})">Delete</span>
<span class="small-btn" onclick="pinPost(${post.id})">Pin</span>
</div>
</div>`;
});
});
}

setInterval(loadPosts,3000);
loadPosts();

// FORM SUBMIT WITH CAPTCHA & FRONTEND FILTER
document.getElementById("postForm").addEventListener("submit", e=>{
e.preventDefault();
const name=e.target.name.value;
let message=e.target.message.value;

// CAPTCHA check
if(document.getElementById("captchaAnswer").value!=7){
alert("Wrong captcha!");
return;
}

// FRONTEND FILTER
const lowerMessage = message.toLowerCase();
for(const word of bannedWords){
  if(lowerMessage.includes(word)){
    alert("Your message contains banned words.");
    return;
  }
}

// SUBMIT TO APPS SCRIPT
const formData=new FormData();
formData.append("name",name);
formData.append("message",message);
formData.append("action","create");

fetch(URL,{method:"POST",body:formData});
e.target.reset();
});

// REACTIONS, EDIT, DELETE, PIN
function react(id,emoji){
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"react",id,emoji})
});
}
function deletePost(id){
const password=prompt("Enter password:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"delete",id,password})
});
}
function editPost(id){
const password=prompt("Password:");
const message=prompt("New message:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"edit",id,password,message})
});
}
function pinPost(id){
const password=prompt("Password:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"pin",id,password})
});
}
</script>

</body>
</html>
