<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Daily Nonsense</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI;}
body{background:#FFD600;overflow-x:hidden;}

.emoji-bg{
position:fixed;width:100%;height:200%;opacity:0.05;
font-size:60px;line-height:80px;
animation:scroll 40s linear infinite;
pointer-events:none;
}
@keyframes scroll{from{transform:translateY(0);}to{transform:translateY(-50%);}}

/* NAV */
nav{
position:fixed;width:100%;top:0;
background:white;padding:15px 40px;
display:flex;justify-content:space-between;
box-shadow:0 4px 20px rgba(0,0,0,0.1);
z-index:100;
}
nav h2{font-weight:bold;}
nav a{text-decoration:none;color:black;margin-left:20px;}

/* CONTAINER */
.container{max-width:900px;margin:auto;padding:140px 20px;}

/* BANNER */
.banner{
background:#FFEB3B;color:black;
padding:15px;
border-radius:12px;
text-align:center;
margin-bottom:20px;
font-weight:bold;
font-size:18px;
letter-spacing:1px;
text-transform:uppercase;
text-shadow:1px 1px #000;
}

/* CARD */
.card{
background:white;padding:20px;
border-radius:15px;margin-bottom:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
animation:fadeIn .4s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.reactions span{cursor:pointer;margin-right:10px;}
.pin{color:red;font-weight:bold;}
.small-btn{font-size:12px;margin-left:10px;cursor:pointer;color:#666;}

/* FORM */
form{background:white;padding:20px;border-radius:15px;margin-bottom:30px;}
input,textarea{width:100%;padding:10px;margin-top:10px;border-radius:8px;border:1px solid #ddd;}
button{margin-top:10px;padding:10px 20px;background:black;color:white;border:none;border-radius:8px;cursor:pointer;}
</style>
</head>
<body>

<div class="emoji-bg">
😂🤣😆😹😜🤪😂🤣😆😹😜🤪😂🤣😆😹😜🤪😂🤣😆😹😜🤪
</div>

<nav>
<h2>Daily Nonsense</h2>
<div>
<a href="#discussion">Discussion</a>
</div>
</nav>

<div class="container">

<div class="banner">
⚠️ WARNING: STRONG LANGUAGE MAY APPEAR BELOW ⚠️
</div>

<h2 id="discussion">Discussion</h2>

<form id="postForm">
<input name="name" placeholder="Your name" required>
<textarea name="message" placeholder="Your nonsense..." required></textarea>
<input id="captchaAnswer" placeholder="What is 3 + 4?" required>
<button type="submit">Post</button>
</form>

<div id="posts"></div>

<script>
// FRONTEND FILTERED WORD LIST
const bannedWords=[
"shit","fuck","bitch","asshole","dick","pussy","cunt","bastard",
"nigger","chink","kike","spic","gook","faggot","tranny","retard",
"porn","sex","hentai","blowjob","cum","dickpic","nude","tits","fuckboy","fuckgirl","incest",
"weed","cocaine","meth","heroin","lsd","ecstasy","mdma","crack","opioid",
"kill","murder","bomb","shoot","stab","assault",
"free money","click here","subscribe","follow me","tiktok.com","discord.gg"
];

const URL="https://script.google.com/macros/s/AKfycbw1KTxR_Tonz1AG4ep2e7WnK5OfbpwC5wSOGSkYSpjBZdSOIHxFUjl2cXVbeRJmdPyemw/exec";

let lastData="";

// LOAD POSTS ANIMATED LIVE
function loadPosts(){
fetch(URL)
.then(r=>r.json())
.then(data=>{
const jsonStr=JSON.stringify(data);
if(jsonStr===lastData)return;
lastData=jsonStr;

const container=document.getElementById("posts");
container.innerHTML="";
data.forEach(post=>{
let reactionsHTML="";
for(let emoji in post.reactions){
reactionsHTML+=`${emoji} ${post.reactions[emoji]} `;
}
container.innerHTML+=`
<div class="card">
${post.pinned?'<div class="pin">📌 Pinned</div>':''}
<h3>${post.name}</h3>
<p>${post.message}</p>
<div class="reactions">
<span onclick="react(${post.id},'😂')">😂</span>
<span onclick="react(${post.id},'🔥')">🔥</span>
<span onclick="react(${post.id},'🤯')">🤯</span>
${reactionsHTML}
</div>
<div>
<span class="small-btn" onclick="editPost(${post.id})">Edit</span>
<span class="small-btn" onclick="deletePost(${post.id})">Delete</span>
<span class="small-btn" onclick="pinPost(${post.id})">Pin</span>
</div>
</div>`;
});
});
}

setInterval(loadPosts,3000);
loadPosts();

// FORM SUBMIT WITH CAPTCHA & FRONTEND FILTER
document.getElementById("postForm").addEventListener("submit", e=>{
e.preventDefault();
const name=e.target.name.value;
let message=e.target.message.value;

// CAPTCHA check
if(document.getElementById("captchaAnswer").value!=7){
alert("Wrong captcha!");
return;
}

// FRONTEND FILTER
const lowerMessage = message.toLowerCase();
for(const word of bannedWords){
  if(lowerMessage.includes(word)){
    alert("Your message contains banned words.");
    return;
  }
}

// SUBMIT TO APPS SCRIPT
const formData=new FormData();
formData.append("name",name);
formData.append("message",message);
formData.append("action","create");

fetch(URL,{method:"POST",body:formData});
e.target.reset();
});

// REACTIONS, EDIT, DELETE, PIN
function react(id,emoji){
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"react",id,emoji})
});
}
function deletePost(id){
const password=prompt("Enter password:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"delete",id,password})
});
}
function editPost(id){
const password=prompt("Password:");
const message=prompt("New message:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"edit",id,password,message})
});
}
function pinPost(id){
const password=prompt("Password:");
fetch(URL,{method:"POST",
body:new URLSearchParams({action:"pin",id,password})
});
}
</script>

</body>
</html>
