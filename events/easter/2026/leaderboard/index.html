<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>

<style>
body{font-family:Arial;text-align:center;background:#f6fff4;}
table{margin:auto;border-collapse:collapse;}
td,th{padding:10px;border:1px solid #ccc;}
</style>
</head>

<body>

<h1>🏆 Leaderboard</h1>
<table id="board"><tr><th>Name</th><th>Points</th></tr></table>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzr_37eqxnuXztugm2f3de3mt8nnWgaPYE_dp6p8k6P8tBOf_mejsx3t4tRntdwq-o/exec";

async function load(){
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  const table=document.getElementById("board");
  table.innerHTML="<tr><th>Name</th><th>Points</th></tr>";

  data.scores.slice(1)
    .sort((a,b)=>b[1]-a[1])
    .forEach(r=>{
      const row=table.insertRow();
      row.insertCell(0).innerText=r[0];
      row.insertCell(1).innerText=r[1];
    });
}

setInterval(load,3000);
load();
</script>

</body>
</html>
