<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body style="text-align:center; font-family:Arial;">

<h1>Admin</h1>

<button onclick="reset()">Reset Scores</button>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzr_37eqxnuXztugm2f3de3mt8nnWgaPYE_dp6p8k6P8tBOf_mejsx3t4tRntdwq-o/exec";

function reset(){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({action:"reset"})
  });

  alert("Reset!");
}
</script>

</body>
</html>
