firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function start(){
  db.ref("game").set({
    startTime: Date.now(),
    duration: 1800000
  });
}

function reset(){
  db.ref("scores").remove();
  db.ref("game").remove();
}
