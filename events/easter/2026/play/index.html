<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{margin:0;font-family:Arial;text-align:center;background:#111;color:white;}
#reader{width:100%;}
#popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;color:black;
  padding:20px;border-radius:10px;
  transition:0.2s;
}
#popup.show{transform:translate(-50%,-50%) scale(1);}
</style>
</head>

<body>

<h2 id="player"></h2>
<h3 id="score"></h3>

<div id="reader"></div>
<div id="popup"></div>

<script>
const params = new URLSearchParams(window.location.search);
const player = params.get("player");

if(!player){
  document.body.innerHTML = `
    <h1 style="color:white;text-align:center;margin-top:100px;">
      No player name!<br>
      <a href="../" style="color:cyan;">Go back</a>
    </h1>
  `;
  throw new Error("No player");
}

const points = {
  // 🥚 Regular Eggs
  EGG1: 5,
  EGG2: 5,
  EGG3: 5,
  EGG4: 5,
  EGG5: 5,
  EGG6: 5,
  EGG7: 5,
  EGG8: 5,
  EGG9: 5,
  EGG10: 5,
  EGG11: 5,
  EGG12: 5,
  EGG13: 5,
  EGG14: 5,
  EGG15: 5,
  EGG16: 5,
  EGG17: 5,
  EGG18: 5,
  EGG19: 5,
  EGG20: 5,
  EGG21: 5,
  EGG22: 5,
  EGG23: 5,
  EGG24: 5,
  EGG25: 5,
  EGG26: 5,
  EGG27: 5,
  EGG28: 5,
  EGG29: 5,
  EGG30: 5,
  EGG31: 5,
  EGG32: 5,
  EGG33: 5,
  EGG34: 5,
  EGG35: 5,

  // 🥉 Bronze (all 15)
  BRONZE1: 15,
  BRONZE2: 15,
  BRONZE3: 15,
  BRONZE4: 15,
  BRONZE5: 15,
  BRONZE6: 15,
  BRONZE7: 15,
  BRONZE8: 15,
  BRONZE9: 15,
  BRONZE10: 15,
  BRONZE11: 15,

  // 🥈 Silver (all 30)
  SILVER1: 30,
  SILVER2: 30,
  SILVER3: 30,
  SILVER4: 30,

  // 🥇 Gold (all 50)
  GOLD1: 50,
  GOLD2: 50,
};

let scanned = JSON.parse(localStorage.getItem("scanned")) || [];
let score = parseInt(localStorage.getItem("score")) || 0;

updateScore();

// 🚫 SCAN LOCK (prevents spam)
let scanLock = false;

function popup(text){
  const p = document.getElementById("popup");
  p.innerText = text;
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),1200);
}

function updateScore(){
  document.getElementById("score").innerText = "Score: " + score;
}

function addPoints(code){

  if(scanLock) return;   // 🔒 prevents rapid repeat scans
  scanLock = true;

  setTimeout(()=>scanLock = false, 1500); // unlock after 1.5s

  if(scanned.includes(code)){
    popup("❌ Already scanned");
    return;
  }

  const pts = points[code];
  if(!pts) return;

  scanned.push(code);
  score += pts;

  localStorage.setItem("scanned", JSON.stringify(scanned));
  localStorage.setItem("score", score);

  updateScore();

  popup("🥚 "+code+" +"+pts);

  confetti();
}

// QR scanner
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(text => addPoints(text.toUpperCase()));
</script>

</body>
</html>
