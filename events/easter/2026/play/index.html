<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{margin:0;font-family:Arial;text-align:center;background:#111;color:white;}
#reader{width:100%;}
</style>
</head>

<body>

<h2 id="player"></h2>
<div id="reader"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzr_37eqxnuXztugm2f3de3mt8nnWgaPYE_dp6p8k6P8tBOf_mejsx3t4tRntdwq-o/exec";

// 🔍 Get player from URL
const params = new URLSearchParams(window.location.search);
const player = params.get("player");

if(!player){
  alert("No player name!");
  location.href="/";
}

document.getElementById("player").innerText = "Player: " + player;

// Points
const points = {
  EGG1:10,
  EGG2:15,
  EGG3:20,
  EGG4:25,
  GOLDEN:100
};

// Prevent duplicates (this session only)
let scanned = [];

// Send to Google Sheets
function send(points){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify({
      action:"score",
      name:player,
      points:points
    })
  });
}

// When scanning
function addPoints(code){
  if(scanned.includes(code)){
    alert("Already scanned!");
    return;
  }

  const pts = points[code];
  if(!pts) return;

  scanned.push(code);

  send(pts);

  // 🎉 Confetti feedback
  confetti();

  alert(code + " +" + pts + " points!");
}

// QR scanner
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(text => addPoints(text.toUpperCase()));

</script>

</body>
</html>
