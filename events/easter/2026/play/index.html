<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Play</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{margin:0;font-family:Arial;text-align:center;background:#111;color:white;}
#reader{width:100%;}
#popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  background:white;color:black;
  padding:20px;border-radius:10px;
  transition:0.2s;
}
#popup.show{transform:translate(-50%,-50%) scale(1);}
</style>
</head>

<body>

<h2 id="player"></h2>
<h3 id="score"></h3>

<div id="reader"></div>
<div id="popup"></div>

<script>
const player = localStorage.getItem("playerName");
if(!player) location.href="index.html";

document.getElementById("player").innerText = "Player: " + player;

const points = {
  EGG1:10,
  EGG2:15,
  EGG3:20,
  EGG4:25,
  GOLDEN:100
};

let scanned = JSON.parse(localStorage.getItem("scanned")) || [];
let score = parseInt(localStorage.getItem("score")) || 0;

updateScore();

// 🚫 SCAN LOCK (prevents spam)
let scanLock = false;

function popup(text){
  const p = document.getElementById("popup");
  p.innerText = text;
  p.classList.add("show");
  setTimeout(()=>p.classList.remove("show"),1200);
}

function updateScore(){
  document.getElementById("score").innerText = "Score: " + score;
}

function addPoints(code){

  if(scanLock) return;   // 🔒 prevents rapid repeat scans
  scanLock = true;

  setTimeout(()=>scanLock = false, 1500); // unlock after 1.5s

  if(scanned.includes(code)){
    popup("❌ Already scanned");
    return;
  }

  const pts = points[code];
  if(!pts) return;

  scanned.push(code);
  score += pts;

  localStorage.setItem("scanned", JSON.stringify(scanned));
  localStorage.setItem("score", score);

  updateScore();

  popup("🥚 "+code+" +"+pts);

  confetti();
}

// QR scanner
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(text => addPoints(text.toUpperCase()));
</script>

</body>
</html>
