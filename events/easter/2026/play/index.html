<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easter Hunt</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body{margin:0;font-family:Arial;text-align:center;background:#111;color:white;}
#reader{width:100%;}
#timer{font-size:22px;margin:10px;}
</style>
</head>

<body>

<h2 id="player"></h2>
<div id="timer"></div>
<div id="reader"></div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwzr_37eqxnuXztugm2f3de3mt8nnWgaPYE_dp6p8k6P8tBOf_mejsx3t4tRntdwq-o/exec";

const player = localStorage.getItem("playerName");
if(!player) location.href="/";

document.getElementById("player").innerText = player;

const points = {EGG1:10,EGG2:15,EGG3:20,EGG4:25,GOLDEN:100};

let foundEggs = JSON.parse(localStorage.getItem("foundEggs")) || [];

function send(data){
  fetch(SCRIPT_URL,{
    method:"POST",
    body:JSON.stringify(data)
  });
}

function addPoints(code){
  if(foundEggs.includes(code)){
    alert("Already scanned!");
    return;
  }

  const pts = points[code];
  if(!pts) return;

  foundEggs.push(code);
  localStorage.setItem("foundEggs", JSON.stringify(foundEggs));

  send({action:"score", name:player, points:pts});
}

// QR Scanner
new Html5QrcodeScanner("reader",{fps:10,qrbox:250})
.render(txt=>addPoints(txt.toUpperCase()));

// ⏱️ TIMER
async function loadGame(){
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  const game = data.game[1];
  if(!game) return;

  const end = game[0] + game[1];

  setInterval(()=>{
    const left = Math.max(0, Math.floor((end-Date.now())/1000));

    document.getElementById("timer").innerText =
      "Time Left: "+Math.floor(left/60)+":"+("0"+left%60).slice(-2);

    if(left<=0) showWinner();
  },1000);
}

async function showWinner(){
  const res = await fetch(SCRIPT_URL);
  const data = await res.json();

  let winner="Nobody", max=0;

  data.scores.slice(1).forEach(r=>{
    if(r[1]>max){max=r[1];winner=r[0];}
  });

  alert("🏆 "+winner+" wins! ("+max+" pts)");

  for(let i=0;i<5;i++){
    setTimeout(()=>confetti(),i*300);
  }
}

loadGame();
</script>

</body>
</html>
